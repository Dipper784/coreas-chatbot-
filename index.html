<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coreas Building Supplies — Ask Us Anything</title>
<style>
  :root{
    --brand:#0b3d66; --brand2:#1769aa; --accent:#f5821f; --bg:#f4f6f8;
    --bot:#eef2f6; --user:#0b3d66; --text:#1a2733; --muted:#6b7a88;
  }
  *{box-sizing:border-box;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  body{margin:0;background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
  .chat{width:100%;max-width:420px;height:640px;max-height:92vh;background:#fff;border-radius:18px;
    box-shadow:0 12px 40px rgba(11,61,102,.18);display:flex;flex-direction:column;overflow:hidden}
  .head{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:18px 20px}
  .head h1{margin:0;font-size:17px;font-weight:700}
  .head p{margin:4px 0 0;font-size:12.5px;opacity:.85}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3ad07a;margin-right:6px;vertical-align:middle}
  .msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
  .row{display:flex}
  .row.u{justify-content:flex-end}
  .bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .b{background:var(--bot);color:var(--text);border-bottom-left-radius:4px}
  .u .bubble{background:var(--user);color:#fff;border-bottom-right-radius:4px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 8px}
  .chip{background:#fff;border:1px solid #d4dde5;color:var(--brand);font-size:12.5px;padding:8px 12px;
    border-radius:20px;cursor:pointer;transition:.15s}
  .chip:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
  .typing{display:flex;gap:4px;padding:12px 14px}
  .typing span{width:7px;height:7px;background:#b4c0cc;border-radius:50%;animation:bl 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
  .foot{display:flex;gap:8px;padding:12px;border-top:1px solid #e7edf2;background:#fff}
  .foot input{flex:1;border:1px solid #d4dde5;border-radius:24px;padding:12px 16px;font-size:14px;outline:none}
  .foot input:focus{border-color:var(--brand2)}
  .foot button{background:var(--accent);color:#fff;border:none;border-radius:24px;width:46px;height:46px;
    font-size:18px;cursor:pointer;flex-shrink:0}
  .foot button:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <div class="chat">
    <div class="head">
      <h1>Coreas Building Supplies</h1>
      <p><span class="dot"></span>Online now — ask about products, prices, or hours</p>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="chips" id="chips">
      <div class="chip">Do you sell cement?</div>
      <div class="chip">Price of a 40ft extension ladder?</div>
      <div class="chip">Do you deliver?</div>
      <div class="chip">What are your opening hours?</div>
    </div>
    <div class="foot">
      <input id="inp" type="text" placeholder="Type your question..." autocomplete="off">
      <button id="send">➤</button>
    </div>
  </div>

<script>
  // ====== SETTINGS ======
  // Leave empty ("") when the page is served by your server (localhost or Render).
  // When you EMBED on another website, put your Render URL here, e.g. "https://coreas-chatbot.onrender.com"
  const BACKEND_URL = "";
  // ======================

  const msgs = document.getElementById("msgs");
  const inp = document.getElementById("inp");
  const send = document.getElementById("send");
  const chips = document.getElementById("chips");
  let history = [];

  function addBubble(text, who){
    const row = document.createElement("div");
    row.className = "row " + (who === "user" ? "u" : "");
    const b = document.createElement("div");
    b.className = "bubble " + (who === "user" ? "" : "b");
    b.textContent = text;
    row.appendChild(b);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row;
  }

  function showTyping(){
    const row = document.createElement("div");
    row.className = "row";
    row.id = "typing";
    row.innerHTML = '<div class="bubble b"><div class="typing"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }
  function hideTyping(){ const t = document.getElementById("typing"); if(t) t.remove(); }

  async function ask(text){
    if(!text.trim()) return;
    chips.style.display = "none";
    addBubble(text, "user");
    history.push({role:"user", content:text});
    inp.value = "";
    send.disabled = true;
    showTyping();
    try{
      const res = await fetch(BACKEND_URL + "/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ message:text, history:history })
      });
      const data = await res.json();
      hideTyping();
      const reply = (data && data.reply) ? data.reply : "Sorry, please try again or call 784-434-1224.";
      addBubble(reply, "bot");
      history.push({role:"assistant", content:reply});
    }catch(e){
      hideTyping();
      addBubble("I couldn't connect right now. Please try again, or call the store at 784-434-1224.", "bot");
    }
    send.disabled = false;
    inp.focus();
  }

  send.onclick = () => ask(inp.value);
  inp.addEventListener("keydown", e => { if(e.key === "Enter") ask(inp.value); });
  chips.querySelectorAll(".chip").forEach(c => c.onclick = () => ask(c.textContent));

  addBubble("Hi! 👋 Welcome to Coreas Building Supplies. I can help you with products, prices, opening hours, and delivery. What are you looking for today?", "bot");
</script>
</body>
</html>
